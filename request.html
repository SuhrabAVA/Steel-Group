<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel Group — Заявка</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <iframe class="sidebar-frame" src="sidebar.html?current=request" title="Левое меню"></iframe>

    <main class="request-page">
      <section class="request-hero">
        <h1>Свяжитесь с Нами</h1>
        <p>Готовы обсудить ваш проект прямо сейчас</p>
      </section>

      <section class="request-shell">
        <article class="request-card">
          <h2>Оставить заявку</h2>
          <p class="request-card__subtitle">Заполните форму и мы свяжемся с вами в течение часа</p>

          <form class="request-form">
            <label class="request-form__group">
              <span>Ваше имя *</span>
              <div class="request-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21a8 8 0 0 0-16 0"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" placeholder="Иван Иванов" required />
              </div>
            </label>

            <label class="request-form__group">
              <span>Телефон *</span>
              <div class="request-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.77 19.77 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.77 19.77 0 0 1 2.11 4.18 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.1 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <input type="tel" placeholder="+7 (999) 123-45-67" required />
              </div>
            </label>

            <label class="request-form__group">
              <span>Email</span>
              <div class="request-input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16v16H4z"></path>
                  <path d="m4 7 8 6 8-6"></path>
                </svg>
                <input type="email" placeholder="email@example.com" />
              </div>
            </label>

            <label class="request-form__group">
              <span>Сообщение</span>
              <div class="request-input-wrap request-input-wrap--textarea">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <textarea placeholder="Опишите ваш заказ..."></textarea>
              </div>
            </label>

            <button type="submit" class="request-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m22 2-7 20-4-9-9-4 20-7z"></path>
              </svg>
              <span>Отправить заявку</span>
            </button>

            <p class="request-policy">Нажимая кнопку, вы соглашаетесь с политикой конфиденциальности</p>
          </form>

          <div class="request-contacts">
            <div class="request-contact-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.77 19.77 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.77 19.77 0 0 1 2.11 4.18 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.1 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
              <div>
                <span>Телефон</span>
                <strong>+7 (999) 123-45-67</strong>
              </div>
            </div>

            <div class="request-contact-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16v16H4z"></path>
                <path d="m4 7 8 6 8-6"></path>
              </svg>
              <div>
                <span>Email</span>
                <strong>info@steelgroup.ru</strong>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
